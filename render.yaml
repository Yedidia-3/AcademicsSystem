services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: jericho-api
    env: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SYNCHRONIZE_DB
        value: "true"          # ← set to false after first deploy
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a random secret
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: DATABASE_URL
        fromDatabase:
          name: jericho-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false            # fill in after Vercel deploy

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
databases:
  - name: jericho-db
    plan: free
    databaseName: jericho_school
    user: jericho
